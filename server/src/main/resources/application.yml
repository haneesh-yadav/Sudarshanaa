server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/plain,text/css

google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

sudarshana:
  security:
    jwt:
      secret: ${SUDARSHANA_JWT_SECRET:}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:5173}
  sync:
    limit: ${SYNC_LIMIT:20}

spring:
  application:
    name: sudarshana-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  h2:
    console:
      enabled: false  # Off by default; explicitly enabled only in the h2 dev profile below

---
# ── Development (H2) ──
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/sudarshana;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

---
# ── Production (PostgreSQL) ──
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sudarshana}}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.sudarshana: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: ERROR

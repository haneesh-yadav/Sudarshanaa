services:
  - type: web
    name: sudarshana-server
    runtime: docker
    region: oregon
    plan: free
    rootDir: server
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: sudarshana-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sudarshana-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sudarshana-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: sudarshana-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: sudarshana-db
          property: password
      - key: SUDARSHANA_JWT_SECRET
        generateValue: true
      - key: SUDARSHANA_ENCRYPTION_KEY
        sync: false
      - key: SEED_DEMO_DATA
        value: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://sudarshana.vercel.app

databases:
  - name: sudarshana-db
    plan: free
    databaseName: sudarshana
    ipAllowList: []
services:
  - type: web
    name: sudarshanaa-server
    runtime: docker
    region: oregon
    plan: free
    rootDir: server
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: SUDARSHANA_JWT_SECRET
        generateValue: true
      - key: SUDARSHANA_ENCRYPTION_KEY
        sync: false
      - key: SEED_DEMO_DATA
        value: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://sudarshanaa.vercel.app
services:
  - type: web
    name: sudarshana-server
    runtime: docker
    region: oregon
    plan: free
    rootDir: server
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: sudarshana-db
          property: connectionString
      - key: SUDARSHANA_JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://sudarshana.vercel.app

databases:
  - name: sudarshana-db
    plan: free
    databaseName: sudarshana
    ipAllowList: []
